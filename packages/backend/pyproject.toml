[build-system]
requires = ["hatchling==1.31.0"]
build-backend = "hatchling.build"

[project]
name = "closeros-backend"
version = "0.0.0"
description = "Shared modular-monolith backend boundaries for CloserOS AI"
requires-python = "==3.12.13"
dependencies = [
    "alembic==1.18.5",
    "argon2-cffi==25.1.0",
    "cryptography==49.0.0",
    "psycopg[binary,pool]==3.3.4",
    "redis==8.0.1",
    "sqlalchemy[asyncio]==2.0.51",
]

[tool.hatch.build.targets.wheel]
packages = ["src/closeros"]
