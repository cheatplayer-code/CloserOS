name: Apply S2 bounded patch

on:
  push:
    branches:
      - feat/s2-staging-deepseek-signoff

permissions:
  contents: write

jobs:
  apply:
    if: ${{ !contains(github.event.head_commit.message, '[s2-patch-applied]') }}
    runs-on: ubuntu-24.04
    steps:
      - name: Check out branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Apply patch
        run: python scripts/ops/apply_s2_patch.py

      - name: Verify whitespace
        run: git diff --check

      - name: Commit changes
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name "CloserOS S2 automation"
          git config user.email "actions@users.noreply.github.com"
          git add PROJECT_STATUS.md apps/api/src/closeros_api/reply_suggestion_router.py
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "feat: expose staging telemetry and refresh status [s2-patch-applied]"
          git push
