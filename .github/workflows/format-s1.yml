name: Format S1 Python changes

on:
  push:
    branches:
      - feat/s1-permanent-deepseek

permissions:
  contents: write

jobs:
  format:
    if: ${{ !contains(github.event.head_commit.message, '[s1-formatted]') }}
    runs-on: ubuntu-24.04
    steps:
      - name: Check out branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version-file: .python-version
          check-latest: false

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: 0.11.28
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install Python workspace
        run: uv sync --all-packages --frozen

      - name: Format changed Python files
        run: |
          uv run ruff format \
            apps/api/src/closeros_api/composition.py \
            apps/api/src/closeros_api/reply_ai_runtime.py \
            apps/api/src/closeros_api/settings.py \
            packages/backend/src/closeros/application/reply_suggestion_service.py \
            packages/backend/src/closeros/infrastructure/configured_ai_credential_resolver.py \
            tests/test_api_reply_ai_runtime.py \
            tests/test_openai_compatible_adapter.py \
            tests/test_reply_provider_metadata.py \
            tests/test_reply_suggestion_live_deepseek.py

      - name: Commit formatting
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name "CloserOS S1 automation"
          git config user.email "actions@users.noreply.github.com"
          git add apps packages tests
          if git diff --cached --quiet; then
            echo "No formatting changes"
            exit 0
          fi
          git commit -m "style: format S1 Python changes [s1-formatted]"
          git push
