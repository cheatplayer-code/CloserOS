name: Apply S2 final polish

on:
  push:
    branches:
      - feat/s2-staging-deepseek-signoff

permissions:
  contents: write

jobs:
  apply:
    if: ${{ !contains(github.event.head_commit.message, '[s2-final-polish-applied]') }}
    runs-on: ubuntu-24.04
    steps:
      - name: Check out branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Apply polish
        run: python scripts/ops/apply_s2_final_polish.py

      - name: Verify whitespace
        run: git diff --check

      - name: Commit changes
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name "CloserOS S2 automation"
          git config user.email "actions@users.noreply.github.com"
          git add scripts/ops/deepseek_staging_smoke.py tests/test_deepseek_staging_smoke.py docs/STAGING_SIGNOFF.md
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "fix: harden S2 smoke payload inspection [s2-final-polish-applied]"
          git push
