name: Capture S2 quality diagnostics

on:
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  capture:
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:18.4-bookworm
        env:
          POSTGRES_DB: closeros_ci
          POSTGRES_USER: closeros_ci
          POSTGRES_PASSWORD: closeros_ci_only_not_production
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U closeros_ci -d closeros_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:8.8.0-trixie
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      AI_EXTERNAL_CALLS_ENABLED: "false"
      TEST_DATABASE_URL: postgresql://closeros_ci:closeros_ci_only_not_production@127.0.0.1:5432/postgres
      TEST_REDIS_URL: redis://127.0.0.1:6379/0
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          check-latest: false

      - name: Enable pnpm
        run: corepack enable pnpm

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version-file: .python-version
          check-latest: false

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: 0.11.28
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install workspaces
        run: |
          corepack pnpm install --frozen-lockfile
          uv sync --all-packages --frozen

      - name: Capture checks
        shell: bash
        run: |
          set +e
          {
            echo '=== FORMAT ==='
            corepack pnpm format:check
            echo "FORMAT_EXIT=$?"
            echo '=== LINT ==='
            corepack pnpm lint
            echo "LINT_EXIT=$?"
            echo '=== TYPECHECK ==='
            corepack pnpm typecheck
            echo "TYPECHECK_EXIT=$?"
            echo '=== FOCUSED TESTS ==='
            uv run pytest -q tests/test_staging_preflight.py tests/test_staging_runtime.py tests/test_deepseek_staging_smoke.py tests/test_reply_suggestion_response_telemetry.py
            echo "FOCUSED_TEST_EXIT=$?"
            echo '=== REDIS TESTS ==='
            uv run pytest -q tests/test_redis_stream_queue.py tests/test_redis_rate_limiter.py
            echo "REDIS_TEST_EXIT=$?"
          } > s2-quality.log 2>&1
          exit 0

      - name: Upload diagnostics
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: s2-quality-log
          path: s2-quality.log
          if-no-files-found: error
          retention-days: 1
