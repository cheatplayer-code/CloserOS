name: Quality

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: quality
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      AI_EXTERNAL_CALLS_ENABLED: "false"

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          check-latest: false

      - name: Enable pinned pnpm through Corepack
        run: |
          corepack enable pnpm
          corepack pnpm --version

      - name: Locate pnpm store
        id: pnpm-store
        shell: bash
        run: echo "path=$(corepack pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Restore pnpm download cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version-file: .python-version
          check-latest: false

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: 0.11.28
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install pnpm workspace from lockfile
        run: corepack pnpm install --frozen-lockfile

      - name: Install Python workspace from lockfile
        run: uv sync --all-packages --frozen

      - name: Run aggregate quality gate
        run: corepack pnpm run quality
