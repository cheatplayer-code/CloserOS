name: Capture S1 quality diagnostics

on:
  push:
    branches:
      - feat/s1-permanent-deepseek

permissions:
  contents: write

jobs:
  capture:
    if: ${{ !contains(github.event.head_commit.message, '[s1-quality-log]') }}
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:18.4-bookworm
        env:
          POSTGRES_DB: closeros_ci
          POSTGRES_USER: closeros_ci
          POSTGRES_PASSWORD: closeros_ci_only_not_production
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U closeros_ci -d closeros_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:8.8.0-trixie
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      AI_EXTERNAL_CALLS_ENABLED: "false"
      TEST_DATABASE_URL: postgresql://closeros_ci:closeros_ci_only_not_production@127.0.0.1:5432/postgres
      TEST_REDIS_URL: redis://127.0.0.1:6379/0
    steps:
      - name: Check out branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          check-latest: false

      - name: Enable pnpm
        run: corepack enable pnpm

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version-file: .python-version
          check-latest: false

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: 0.11.28
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install workspaces
        run: |
          corepack pnpm install --frozen-lockfile
          uv sync --all-packages --frozen

      - name: Capture aggregate quality output
        shell: bash
        run: |
          set +e
          corepack pnpm run quality > s1-quality.log 2>&1
          code=$?
          printf '\nQUALITY_EXIT_CODE=%s\n' "$code" >> s1-quality.log
          exit 0

      - name: Commit diagnostic log
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name "CloserOS S1 automation"
          git config user.email "actions@users.noreply.github.com"
          git add s1-quality.log
          git commit -m "chore: capture S1 quality output [s1-quality-log]"
          git push

