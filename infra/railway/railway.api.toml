# Railway config-as-code for the CloserOS API service (staging/production).
# Point the Railway service "Config file path" at this file.
# Secrets are injected through Railway variables, never committed here.

[build]
builder = "DOCKERFILE"
dockerfilePath = "infra/docker/Dockerfile.api"
watchPatterns = ["apps/api/**", "packages/backend/**", "pyproject.toml", "uv.lock"]

[deploy]
healthcheckPath = "/ready"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
numReplicas = 1

[deploy.multiRegionConfig]
# Enable when approved for production pilot (Block Z).
