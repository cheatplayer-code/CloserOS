# Railway config-as-code for the CloserOS background worker service.
# Run as a separate Railway service from the API. Scale replicas only after
# outbox lag monitoring is in place (see docs/WORKER_OPERATIONS.md).

[build]
builder = "DOCKERFILE"
dockerfilePath = "infra/docker/Dockerfile.worker"
watchPatterns = ["apps/worker/**", "packages/backend/**", "infra/docker/**", "pyproject.toml", "uv.lock"]

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
numReplicas = 1

# Worker has no HTTP health endpoint. Monitor logs, outbox lag, and dead-letter counts.
